name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test & Quality Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Create .npmrc file
        run: |
          cat << EOF > ${HOME}/.npmrc
          # Default registry for unscoped packages (npm)
          registry=https://registry.npmjs.org/

          # GitHub registry for scoped packages (for organizations using GitHub packages)
          @paystackhq:registry=https://npm.pkg.github.com

          # Authentication placeholder (will be set by CI/CD)
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          EOF
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run type-check

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Run tests
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Test build artifacts
        run: |
          # Verify dist directory exists and contains expected files
          test -d dist
          test -d dist/cjs
          test -d dist/esm
          test -f dist/cjs/index.js
          test -f dist/cjs/index.d.ts
          test -f dist/esm/index.js
          test -f dist/esm/index.d.ts
          test -f dist/package.json

  build-examples:
    name: Test Examples
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Create .npmrc file
        run: |
          cat << EOF > ${HOME}/.npmrc
          # Default registry for unscoped packages (npm)
          registry=https://registry.npmjs.org/

          # GitHub registry for scoped packages (for organizations using GitHub packages)
          @paystackhq:registry=https://npm.pkg.github.com

          # Authentication placeholder (will be set by CI/CD)
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          EOF
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm run build

      - name: Test basic example
        working-directory: examples/basic-app
        run: |
          pnpm install
          pnpm run build
          pnpm run test
