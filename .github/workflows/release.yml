name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # We need to fetch history to run changesets correctly
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          # Registry configuration is handled by .npmrc file

      - name: Create .npmrc file
        run: |
          cat << EOF > ${HOME}/.npmrc
          # Default registry for unscoped packages (npm)
          registry=https://registry.npmjs.org/

          # GitHub registry for scoped packages (for organizations using GitHub packages)
          @paystackhq:registry=https://npm.pkg.github.com

          # Authentication placeholder (will be set by CI/CD)
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          EOF
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pnpm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for Changeset files
        id: changesets
        run: |
          if [ -n "$(ls .changeset/*.md 2>/dev/null | grep -v README)" ]; then
            echo "has_changesets=true" >> $GITHUB_OUTPUT
            echo "Found changeset files - proceeding with release"
          else
            echo "has_changesets=false" >> $GITHUB_OUTPUT
            echo "No changeset files found - skipping release"
          fi

      - name: Create Release and Publish
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          # Configure git for the bot
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          echo "Running changeset version..."
          pnpm changeset version

          echo "Committing version changes..."
          git add .
          git commit -m "chore(release): version packages" || echo "No changes to commit"

          echo "Pushing changes to repository..."
          git push origin main

          echo "Publishing to GitHub npm registry..."
          pnpm changeset publish

          echo "Pushing tags to repository..."
          git push --tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
